name: Create Release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  create-release:
    name: Create Release
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Configure Git author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create release
        env:
          FOLIA_KANBAN_RELEASE_IT_GITHUB_TOKEN: ${{ secrets.FOLIA_KANBAN_RELEASE_IT_GITHUB_TOKEN }}
        run: |
          # Inject the push token only here, never during dependency install, so
          # the release PAT is absent from .git/config while package code runs.
          git remote set-url origin "https://x-access-token:${FOLIA_KANBAN_RELEASE_IT_GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          pnpm ci:release
